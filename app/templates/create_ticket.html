{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Create Ticket</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('main.create_ticket') }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <button type="button" id="suggestBtn" class="btn btn-outline-primary btn-sm">
                            ✨ Get AI Suggestions
                        </button>
                        <span id="suggestLoading" class="ms-2 text-muted" style="display: none;">
                            <span class="spinner-border spinner-border-sm"></span> Analyzing...
                        </span>
                        <div id="suggestResult" class="alert alert-info mt-2" style="display: none;"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-select" id="priority" name="priority" required>
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="bug">Bug</option>
                                <option value="user_support">User Support</option>
                                <option value="data_issue">Data Issue</option>
                                <option value="feature_request">Feature Request</option>
                                <option value="access_permissions">Access / Permissions</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="assignee_id" class="form-label">Assignee</label>
                        <select class="form-select" id="assignee_id" name="assignee_id">
                            <option value="">-- Select Assignee --</option>
                            {% for user in users %}
                                <option value="{{ user.id }}">{{ user.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Create Ticket</button>
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById('suggestBtn').addEventListener('click', function() {
    const title = document.getElementById('title').value;
    const description = document.getElementById('description').value;
    
    if (!title || !description) {
        alert('Please enter a title and description first.');
        return;
    }
    
    const btn = this;
    const loading = document.getElementById('suggestLoading');
    const result = document.getElementById('suggestResult');
    
    btn.disabled = true;
    loading.style.display = 'inline';
    result.style.display = 'none';
    
    const formData = new FormData();
    formData.append('title', title);
    formData.append('description', description);
    
    fetch('{{ url_for("main.suggest_category") }}', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        btn.disabled = false;
        loading.style.display = 'none';
        
        if (data.error) {
            result.className = 'alert alert-warning mt-2';
            result.textContent = 'Could not get suggestions. Please select manually.';
        } else {
            result.className = 'alert alert-info mt-2';
            result.innerHTML = '<strong>AI Suggestion:</strong> ' + 
                'Category: <strong>' + data.category + '</strong>, ' +
                'Priority: <strong>' + data.priority + '</strong><br>' +
                '<small>' + data.reason + '</small><br>' +
                '<button type="button" class="btn btn-sm btn-primary mt-2" onclick="applySuggestions(\'' + data.category + '\', \'' + data.priority + '\')">Apply Suggestions</button>';
        }
        result.style.display = 'block';
    })
    .catch(error => {
        btn.disabled = false;
        loading.style.display = 'none';
        result.className = 'alert alert-warning mt-2';
        result.textContent = 'Error getting suggestions.';
        result.style.display = 'block';
    });
});

function applySuggestions(category, priority) {
    document.getElementById('category').value = category;
    document.getElementById('priority').value = priority;
    document.getElementById('suggestResult').innerHTML += '<br><span class="text-success">✓ Applied!</span>';
}
</script>
{% endblock %}
